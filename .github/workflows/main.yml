name: 'Lint Code'

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint_python:
    name: Lint Python Files
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Run Linter
      run: |
        # Added --exclude=migrations to ignore auto-generated Django files
        # Added --max-line-length=120 to be a bit more flexible with modern screens
        flake8 ./server --exclude=migrations --max-line-length=120 --count --statistics
        echo "Linted all the python files successfully"

  lint_js:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Install Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install JSHint
      run: npm install jshint --global

    - name: Run Linter
      run: |
        # Targets your database JS files as specified in the task
        find ./server/database -name "*.js" -exec jshint {} +
        echo "Linted all the js files successfully"
